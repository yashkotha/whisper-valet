<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  html, body { background: #0B0B0F; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// Whisper Valet — glass demo. ?aspect=wide -> 3840x2160 still
// scene; default -> 2160x2160 square video. Deterministic.
// Glass: ambient orbs frost through translucent panels.
// House feel: ease-out-cubic in, ease-in out, no bounce, gold scarce.
// ============================================================
const SQ = new URLSearchParams(location.search).get('aspect') !== 'wide';
const W = SQ ? 2160 : 3840, H = 2160;
const cnv = document.getElementById('c');
cnv.width = W; cnv.height = H;
const ctx = cnv.getContext('2d');

const FPS = 60, DUR = 20;
const SHIFT = 1.0;                       // opening title card
window.TOTAL = FPS * DUR;

// ---- easing ----
const eoc = t => 1 - Math.pow(1 - t, 3);
const eic = t => t * t * t;
const eio = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
const cl = v => Math.max(0, Math.min(1, v));
const seg = (s, a, b) => cl((s - a) / (b - a));

// ---- palette ----
const GOLD = '#C9A96A', GOLD_T = '#D4B77E', LIGHT = '#D9DAE0';
const TXT = '#F2F2F5', SUB = '#A6A6AF', DIM = '#75757F', FAINT = '#55555E';

const SANS = '-apple-system, "SF Pro Display", "Helvetica Neue", sans-serif';
const MONO = '"SF Mono", Menlo, monospace';
const F = (w, s, mono) => `${w} ${s}px ${mono ? MONO : SANS}`;

function mulberry(seed){return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let z=Math.imul(seed^(seed>>>15),1|seed);z=(z+Math.imul(z^(z>>>7),61|z))^z;return((z^(z>>>14))>>>0)/4294967296;};}

// ---- layout (square vs wide) ----
const L = SQ ? {
  win:  { x: 200,  y: 300,  w: 1760, h: 1180, r: 34 },
  twin: { x: 330,  y: 1060, w: 1710, h: 1000, r: 34 },
  rowH: 100, rowPitch: 124, stagePitch: 136,
  miniY: 1035, cursorStart: [140, 2060],
  notifW: 700, fs: 1.0,
} : {
  win:  { x: 560,  y: 420,  w: 1660, h: 1330, r: 34 },
  twin: { x: 2000, y: 560,  w: 1420, h: 1250, r: 34 },
  rowH: 122, rowPitch: 152, stagePitch: 150,
  miniY: 1540, cursorStart: [300, 1980],
  notifW: 760, fs: 1.0,
};

// ---- ambient orbs (rendered small, upscaled = cheap blur) ----
const orbCanvas = document.createElement('canvas');
orbCanvas.width = W / 12; orbCanvas.height = H / 12;
const octx = orbCanvas.getContext('2d');
const ORBS = [
  { bx: 0.22, by: 0.16, r: 0.42, c: '201,169,106', a: 0.10, k1: 1, k2: 2, ph: 0.3 },
  { bx: 0.85, by: 0.70, r: 0.50, c: '91,107,140',  a: 0.10, k1: 2, k2: 1, ph: 2.1 },
  { bx: 0.45, by: 1.02, r: 0.44, c: '160,120,90',  a: 0.06, k1: 1, k2: 1, ph: 4.2 },
  { bx: 0.70, by: 0.05, r: 0.36, c: '120,130,150', a: 0.07, k1: 2, k2: 2, ph: 5.5 },
];
function paintOrbs(timeS) {
  const w = orbCanvas.width, h = orbCanvas.height;
  octx.fillStyle = '#0B0B0F';
  octx.fillRect(0, 0, w, h);
  for (const o of ORBS) {
    const x = (o.bx + 0.05 * Math.sin(2*Math.PI*o.k1*timeS/DUR + o.ph)) * w;
    const y = (o.by + 0.05 * Math.cos(2*Math.PI*o.k2*timeS/DUR + o.ph)) * h;
    const r = o.r * w;
    const g = octx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, `rgba(${o.c},${o.a})`);
    g.addColorStop(1, `rgba(${o.c},0)`);
    octx.fillStyle = g;
    octx.fillRect(0, 0, w, h);
  }
}

function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

// ---- the glass system ----
function glass(x, y, w, h, r, alpha, opts = {}) {
  if (alpha <= 0) return;
  const tint = opts.tint || 'rgba(16,16,22,0.55)';
  ctx.save();
  ctx.globalAlpha = alpha;
  // deep soft shadow
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 110; ctx.shadowOffsetY = 36;
  ctx.fillStyle = 'rgba(10,10,14,0.9)';
  rr(x, y, w, h, r); ctx.fill();
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
  // frost: ambient orbs show through, brightened
  ctx.save();
  rr(x, y, w, h, r); ctx.clip();
  ctx.filter = 'saturate(1.35) brightness(1.5)';
  ctx.drawImage(orbCanvas, 0, 0, W, H);
  ctx.filter = 'none';
  ctx.fillStyle = tint;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = 'rgba(255,255,255,0.045)';
  ctx.fillRect(x, y, w, h);
  // top sheen
  const sheen = ctx.createLinearGradient(0, y, 0, y + h * 0.38);
  sheen.addColorStop(0, 'rgba(255,255,255,0.10)');
  sheen.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sheen;
  ctx.fillRect(x, y, w, h * 0.38);
  ctx.restore();
  // gradient border: bright top, faint bottom
  const bg = ctx.createLinearGradient(0, y, 0, y + h);
  bg.addColorStop(0, 'rgba(255,255,255,0.28)');
  bg.addColorStop(0.25, 'rgba(255,255,255,0.10)');
  bg.addColorStop(1, 'rgba(255,255,255,0.05)');
  ctx.strokeStyle = bg; ctx.lineWidth = 2;
  rr(x+1, y+1, w-2, h-2, r); ctx.stroke();
  ctx.restore();
}
function glassRow(x, y, w, h, r, alpha, hot) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = hot ? 'rgba(201,169,106,0.10)' : 'rgba(255,255,255,0.055)';
  rr(x, y, w, h, r); ctx.fill();
  const bg = ctx.createLinearGradient(0, y, 0, y + h);
  bg.addColorStop(0, hot ? 'rgba(212,183,126,0.45)' : 'rgba(255,255,255,0.16)');
  bg.addColorStop(1, hot ? 'rgba(212,183,126,0.15)' : 'rgba(255,255,255,0.05)');
  ctx.strokeStyle = bg; ctx.lineWidth = 1.5;
  rr(x+0.75, y+0.75, w-1.5, h-1.5, r); ctx.stroke();
  ctx.restore();
}
function trafficLights(x, y, alpha) {
  const cols = ['#FF5F57', '#FEBC2E', '#28C840'];
  ctx.save(); ctx.globalAlpha = alpha;
  cols.forEach((c, i) => {
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(x + i*46, y, 12.5, 0, 7); ctx.fill();
    const gl = ctx.createRadialGradient(x + i*46 - 4, y - 5, 0, x + i*46, y, 13);
    gl.addColorStop(0, 'rgba(255,255,255,0.5)');
    gl.addColorStop(0.5, 'rgba(255,255,255,0.05)');
    gl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(x + i*46, y, 12.5, 0, 7); ctx.fill();
  });
  ctx.restore();
}
function appTile(x, y, s, alpha) {   // glass gold app icon with W
  if (alpha <= 0) return;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 40; ctx.shadowOffsetY = 12;
  const g = ctx.createLinearGradient(0, y, 0, y + s);
  g.addColorStop(0, 'rgba(212,183,126,0.30)');
  g.addColorStop(1, 'rgba(160,120,70,0.16)');
  ctx.fillStyle = g;
  rr(x, y, s, s, s*0.24); ctx.fill();
  ctx.shadowColor = 'transparent';
  const bg = ctx.createLinearGradient(0, y, 0, y + s);
  bg.addColorStop(0, 'rgba(255,235,200,0.55)');
  bg.addColorStop(1, 'rgba(212,183,126,0.12)');
  ctx.strokeStyle = bg; ctx.lineWidth = 2;
  rr(x+1, y+1, s-2, s-2, s*0.24); ctx.stroke();
  const sheen = ctx.createLinearGradient(0, y, 0, y + s*0.5);
  sheen.addColorStop(0, 'rgba(255,255,255,0.22)');
  sheen.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = sheen;
  rr(x, y, s, s*0.5, s*0.24); ctx.fill();
  ctx.fillStyle = '#F0DDB8';
  ctx.font = `650 ${s*0.52}px ${SANS}`;
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillText('W', x + s/2, y + s/2 + s*0.03);
  ctx.textAlign = 'left';
  ctx.restore();
}
function audioIcon(x, y, s, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha; ctx.fillStyle = color;
  const hs = [0.45, 0.8, 0.6, 1.0, 0.5, 0.75, 0.4];
  hs.forEach((h, i) => { const bh = s * h; rr(x + i*s*0.22, y + (s-bh)/2, s*0.13, bh, s*0.065); ctx.fill(); });
  ctx.restore();
}
function docIcon(x, y, s, color, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.strokeStyle = color; ctx.lineWidth = s * 0.09;
  const w = s * 0.78, f = s * 0.26;
  rr(x, y, w, s, s*0.10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + w - f, y); ctx.lineTo(x + w - f, y + f); ctx.lineTo(x + w, y + f);
  ctx.stroke();
  ctx.restore();
}
function spinner(cx, cy, r, timeS, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.strokeStyle = SUB; ctx.lineWidth = 5.5; ctx.lineCap = 'round';
  const a0 = (timeS * 4.2) % (Math.PI * 2);
  ctx.beginPath(); ctx.arc(cx, cy, r, a0, a0 + Math.PI * 1.4); ctx.stroke();
  ctx.restore();
}
function check(cx, cy, s, prog, alpha) {
  if (prog <= 0) return;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.strokeStyle = GOLD; ctx.lineWidth = 6.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.shadowColor = 'rgba(201,169,106,0.45)'; ctx.shadowBlur = 18;
  const p1 = {x: cx - s*0.5, y: cy + s*0.05}, p2 = {x: cx - s*0.12, y: cy + s*0.42}, p3 = {x: cx + s*0.55, y: cy - s*0.38};
  ctx.beginPath(); ctx.moveTo(p1.x, p1.y);
  const t = eoc(prog);
  if (t < 0.45) { const k = t/0.45; ctx.lineTo(p1.x + (p2.x-p1.x)*k, p1.y + (p2.y-p1.y)*k); }
  else { ctx.lineTo(p2.x, p2.y); const k = (t-0.45)/0.55; ctx.lineTo(p2.x + (p3.x-p2.x)*k, p2.y + (p3.y-p2.y)*k); }
  ctx.stroke();
  ctx.restore();
}
function cursor(x, y, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 14; ctx.shadowOffsetY = 4;
  ctx.fillStyle = '#FFFFFF'; ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x, y + 56); ctx.lineTo(x + 13, y + 44);
  ctx.lineTo(x + 21, y + 62); ctx.lineTo(x + 30, y + 58); ctx.lineTo(x + 22, y + 40);
  ctx.lineTo(x + 40, y + 40); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.restore();
}
function chipLabel(label, cx, cy, gold, alpha, scale) {
  if (alpha <= 0) return;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.font = F(500, 27 * scale, true);
  const pad = 26 * scale, tw = ctx.measureText(label).width + label.length * 3.2 * scale;
  const w = tw + pad*2, h = 56 * scale, x = cx - w/2, y = cy - h/2;
  ctx.fillStyle = gold ? 'rgba(201,169,106,0.12)' : 'rgba(255,255,255,0.07)';
  rr(x, y, w, h, h/2); ctx.fill();
  const bg = ctx.createLinearGradient(0, y, 0, y + h);
  bg.addColorStop(0, gold ? 'rgba(212,183,126,0.5)' : 'rgba(255,255,255,0.2)');
  bg.addColorStop(1, gold ? 'rgba(212,183,126,0.15)' : 'rgba(255,255,255,0.06)');
  ctx.strokeStyle = bg; ctx.lineWidth = 1.5;
  rr(x, y, w, h, h/2); ctx.stroke();
  ctx.fillStyle = gold ? GOLD_T : '#C2C2CB';
  ctx.textBaseline = 'middle';
  let lx = x + pad;
  for (const ch of label) { ctx.fillText(ch, lx, cy + 1); lx += ctx.measureText(ch).width + 3.2 * scale; }
  ctx.restore();
}
function wordmark(cx, cy, size, alpha, align) {
  if (alpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textBaseline = 'alphabetic';
  ctx.letterSpacing = `${-size * 0.028}px`;
  ctx.font = `650 ${size}px ${SANS}`;
  const w1 = ctx.measureText('Whisper ').width;
  ctx.font = `350 ${size}px ${SANS}`;
  const w2 = ctx.measureText('Valet').width;
  const sx = align === 'left' ? cx : cx - (w1 + w2) / 2;
  ctx.fillStyle = '#F5F5F7';
  ctx.font = `650 ${size}px ${SANS}`;
  ctx.fillText('Whisper ', sx, cy);
  ctx.fillStyle = '#CBCCD3';
  ctx.font = `350 ${size}px ${SANS}`;
  ctx.fillText('Valet', sx + w1, cy);
  ctx.letterSpacing = '0px';
  ctx.restore();
}

// ---- content ----
const STAGES = [
  { name: 'Extract audio',      tool: 'ffmpeg',     t0: 3.3, t1: 4.6 },
  { name: 'Isolate voices',     tool: 'demucs',     t0: 4.6, t1: 6.9 },
  { name: 'Lift quiet speaker', tool: 'loudnorm',   t0: 6.9, t1: 7.7 },
  { name: 'Transcribe',         tool: 'macwhisper', t0: 7.7, t1: 9.3 },
  { name: 'Label speakers',     tool: 'pyannote',   t0: 9.3, t1: 10.7 },
];
const FILES = [
  ['interview.mp3',                  '4.2 MB', 'audio'],
  ['interview.cleaned.mp3',          '4.4 MB', 'audio'],
  ['interview.cleaned_aggressive.mp3','4.4 MB','audio'],
  ['transcript.txt',                 '2 KB',   'doc'],
  ['transcript.srt',                 '3 KB',   'doc'],
  ['transcript.json',                '18 KB',  'doc'],
  ['report.txt',                     '1 KB',   'doc'],
];
const LINES = [
  ['0:00', 'SPEAKER 1', true,  'So tell me how this project started.'],
  ['0:06', 'SPEAKER 2', false, 'It began as a side experiment last spring.'],
  ['0:14', 'SPEAKER 1', true,  'And what convinced you it was real?'],
  ['0:19', 'SPEAKER 2', false, 'The first prototype. It just worked.'],
];

// mini waveform
const mcols = [];
{
  const N = 110;
  for (let i = 0; i < N; i++) {
    const rnd = mulberry(5000 + i * 271);
    const t = i / (N - 1);
    const env = 0.35 + 0.65 * Math.abs(Math.sin(t*9.1)*0.55 + Math.sin(t*23.7)*0.3 + Math.sin(t*3.3)*0.35);
    mcols.push({ t, env, dots: Array.from({length: 6}, () => ({ dy: (rnd()*2-1)*44*env, op: 0.16+rnd()*0.45, sz: 3+rnd()*3 })) });
  }
}
const MTURNS = [[0.03,0.24,1],[0.28,0.42,0],[0.46,0.72,1],[0.76,0.88,0],[0.90,1.0,1]];
function mturn(t){ for (const [a,b,sp] of MTURNS) if (t>=a&&t<=b) return sp; return -1; }

function notification(s, a, b, title, body) {
  const tin = eoc(seg(s, a, a + 0.55));
  const tout = 1 - eic(seg(s, b - 0.4, b));
  const al = Math.min(tin, tout);
  if (al <= 0) return;
  const w = L.notifW, h = 156;
  const x = W - 70 - w + (1 - tin) * (w + 110), y = 90;
  ctx.save(); ctx.globalAlpha = al;
  glass(x, y, w, h, 30, 1, { tint: 'rgba(22,22,30,0.42)' });
  appTile(x + 28, y + 34, 88, 1);
  ctx.fillStyle = TXT; ctx.font = F(600, 34); ctx.textBaseline = 'middle';
  ctx.fillText(title, x + 144, y + 60);
  ctx.fillStyle = SUB; ctx.font = F(400, 30);
  ctx.fillText(body, x + 144, y + 108);
  ctx.restore();
}

// ============================================================
window.renderFrame = function(frame) {
  const realS = frame / FPS;
  const s = realS - SHIFT;

  // ---- ambient stage ----
  paintOrbs(realS);
  ctx.globalAlpha = 1;
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(orbCanvas, 0, 0, W, H);
  const vg = ctx.createRadialGradient(W/2, H/2, 300, W/2, H/2, Math.max(W, H));
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

  const { win, twin } = L;
  const winIn = eoc(seg(s, 0.1, 0.75));
  const endDim = 1 - 0.85 * eoc(seg(s, 17.4, 18.0));   // windows recede for the close
  const wy = win.y + (1 - winIn) * 50;

  // ---- main window ----
  if (winIn > 0) {
    glass(win.x, wy, win.w, win.h, win.r, winIn * endDim);
    trafficLights(win.x + 52, wy + 46, winIn * endDim);
    ctx.save(); ctx.globalAlpha = winIn * endDim;
    ctx.fillStyle = TXT; ctx.font = F(600, 36); ctx.textBaseline = 'middle';
    ctx.fillText('AudioDrop', win.x + 200, wy + 48);
    ctx.fillStyle = DIM; ctx.font = F(400, 27, true);
    const pw = ctx.measureText('~/AudioDrop').width;
    ctx.fillText('~/AudioDrop', win.x + win.w - pw - 48, wy + 48);
    ctx.strokeStyle = 'rgba(255,255,255,0.09)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(win.x + 24, wy + 94); ctx.lineTo(win.x + win.w - 24, wy + 94); ctx.stroke();
    ctx.restore();
  }
  const cy0 = wy + 94;
  const showResults = s >= 12.0;
  const procIn = seg(s, 2.7, 3.3);

  // ---- empty state ----
  const emptyOut = 1 - eic(seg(s, 2.0, 2.4));
  if (emptyOut > 0 && !showResults && procIn < 1) {
    ctx.save(); ctx.globalAlpha = winIn * emptyOut * (1 - procIn) * endDim;
    ctx.fillStyle = FAINT; ctx.font = F(400, 42);
    const msg = 'Drop audio here';
    ctx.fillText(msg, win.x + (win.w - ctx.measureText(msg).width)/2, cy0 + win.h * 0.42);
    ctx.strokeStyle = 'rgba(255,255,255,0.13)'; ctx.setLineDash([16, 16]); ctx.lineWidth = 2.5;
    rr(win.x + 110, cy0 + win.h * 0.24, win.w - 220, win.h * 0.34, 24);
    ctx.stroke(); ctx.setLineDash([]);
    ctx.restore();
  }

  // ---- drag: bezier arc, chip scales up slightly on pickup ----
  const dragP = seg(s, 0.9, 2.3);
  if (dragP > 0 && s < 2.25) {
    const e = eio(dragP);
    const [sx, sy] = L.cursorStart;
    const ex = win.x + win.w/2, ey = cy0 + win.h * 0.40;
    const mx = (sx + ex) / 2 - 260, my = Math.min(sy, ey) - 420;   // control point: arc up-left
    const bez = (a, b, c, t) => (1-t)*(1-t)*a + 2*(1-t)*t*b + t*t*c;
    const cxp = bez(sx, mx, ex, e), cyp = bez(sy, my, ey, e);
    const scale = 1 + 0.04 * Math.sin(Math.PI * Math.min(1, e * 1.15));
    const chw = 470 * scale, chh = 94 * scale;
    glass(cxp - chw/2, cyp - chh/2, chw, chh, 22, 0.98, { tint: 'rgba(24,24,32,0.4)' });
    audioIcon(cxp - chw/2 + 32, cyp - 27, 54, GOLD_T, 1);
    ctx.fillStyle = TXT; ctx.font = F(500, 33, true); ctx.textBaseline = 'middle';
    ctx.fillText('interview.mp3', cxp - chw/2 + 130, cyp + 1);
    cursor(cxp + 135, cyp + 22, 1);
  }
  const exitP = seg(s, 2.25, 2.95);
  if (exitP > 0 && exitP < 1) {
    const e = eic(exitP);
    cursor(win.x + win.w/2 + 135 + e * 1300, cy0 + win.h * 0.40 + e * 800, 1 - e);
  }

  // ---- processing ----
  if (!showResults && procIn > 0) {
    const a = eoc(procIn) * winIn * endDim;
    ctx.save(); ctx.globalAlpha = a;
    const frY = cy0 + 44;
    glassRow(win.x + 48, frY, win.w - 96, L.rowH + 8, 20, 1, false);
    audioIcon(win.x + 88, frY + (L.rowH + 8 - 56)/2, 56, GOLD_T, 1);
    ctx.fillStyle = TXT; ctx.font = F(500, 34, true); ctx.textBaseline = 'middle';
    ctx.fillText('interview.mp3', win.x + 180, frY + (L.rowH + 8)/2);
    ctx.fillStyle = SUB; ctx.font = F(400, 28);
    const dw = ctx.measureText('3 min 12 s').width;
    ctx.fillText('3 min 12 s', win.x + win.w - dw - 84, frY + (L.rowH + 8)/2);
    STAGES.forEach((st, i) => {
      const ry = frY + 170 + i * L.stagePitch;
      const started = s >= st.t0, done = s >= st.t1;
      const doneP = seg(s, st.t1, st.t1 + 0.4);
      ctx.globalAlpha = a * (started ? 1 : 0.4);
      const gx = win.x + 116, gy = ry + 26;
      if (done) check(gx, gy, 34, doneP, 1);
      else if (started) spinner(gx, gy, 22, realS, 1);
      else { ctx.strokeStyle = FAINT; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(gx, gy, 20, 0, 7); ctx.stroke(); }
      ctx.fillStyle = started ? TXT : SUB; ctx.font = F(500, 37); ctx.textBaseline = 'middle';
      ctx.fillText(st.name, win.x + 188, ry + 26);
      ctx.fillStyle = DIM; ctx.font = F(400, 27, true);
      ctx.fillText(st.tool, win.x + 188 + 470, ry + 28);
      if (started && !done) {
        const pp = seg(s, st.t0, st.t1);
        ctx.fillStyle = 'rgba(255,255,255,0.10)';
        rr(win.x + 188, ry + 64, win.w - 470, 5, 2.5); ctx.fill();
        const pg = ctx.createLinearGradient(win.x + 188, 0, win.x + 188 + (win.w - 470) * pp, 0);
        pg.addColorStop(0, 'rgba(201,169,106,0.5)');
        pg.addColorStop(1, GOLD);
        ctx.fillStyle = pg;
        rr(win.x + 188, ry + 64, (win.w - 470) * pp, 5, 2.5); ctx.fill();
      }
    });
    // mini waveform
    const resolveP = seg(s, 4.6, 7.7);
    const colorP = eoc(seg(s, 10.3, 10.9));
    const mzx = win.x + 110, mzw = win.w - 220, mzy = wy + L.miniY;
    for (const c of mcols) {
      const mx = mzx + c.t * mzw;
      const res = eoc(cl((resolveP * 1.25 - c.t) / 0.12));
      if (res < 1) {
        for (const d of c.dots) {
          ctx.globalAlpha = a * d.op * (1 - res);
          ctx.fillStyle = '#9494A0';
          ctx.fillRect(mx, mzy + d.dy, d.sz, d.sz);
        }
      }
      if (res > 0) {
        const sp = mturn(c.t);
        const hh = sp < 0 ? 5 : (10 + c.env * 62);
        let fill = LIGHT, op = 0.85;
        if (sp < 0) { fill = '#4A4A55'; op = 0.8; }
        else if (sp === 0) { fill = colorP > 0 ? GOLD : LIGHT; op = 0.92; }
        ctx.globalAlpha = a * op * res;
        ctx.fillStyle = fill;
        rr(mx, mzy + 20 - hh/2, 5, hh, 2.5); ctx.fill();
      }
    }
    ctx.restore();
  }

  // ---- results ----
  if (showResults) {
    const a = eoc(seg(s, 12.0, 12.6)) * winIn * endDim;
    ctx.save(); ctx.globalAlpha = a;
    ctx.fillStyle = SUB; ctx.font = F(400, 28, true); ctx.textBaseline = 'middle';
    ctx.fillText('Processed / interview /', win.x + 56, cy0 + 46);
    FILES.forEach((f, i) => {
      const rowIn = eoc(seg(s, 12.15 + i * 0.08, 12.6 + i * 0.08));
      if (rowIn <= 0) return;
      const ry = cy0 + 90 + i * L.rowPitch + (1 - rowIn) * 18;
      ctx.globalAlpha = a * rowIn;
      const hot = f[0] === 'transcript.txt';
      glassRow(win.x + 48, ry, win.w - 96, L.rowH, 20, 1, hot);
      if (f[2] === 'audio') audioIcon(win.x + 88, ry + (L.rowH - 52)/2, 52, hot ? GOLD_T : '#B2B2BE', 1);
      else docIcon(win.x + 92, ry + (L.rowH - 56)/2, 56, hot ? GOLD_T : '#B2B2BE', 1);
      ctx.fillStyle = TXT; ctx.font = F(500, 33, true); ctx.textBaseline = 'middle';
      ctx.fillText(f[0], win.x + 180, ry + L.rowH/2);
      ctx.fillStyle = DIM; ctx.font = F(400, 27, true);
      const sw = ctx.measureText(f[1]).width;
      ctx.fillText(f[1], win.x + win.w - sw - 84, ry + L.rowH/2);
    });
    ctx.restore();
  }

  // ---- notifications ----
  notification(s, 2.6, 5.2, 'Whisper Valet', 'interview: processing started');
  notification(s, 10.9, 13.3, 'Whisper Valet', 'interview: transcript ready');

  // ---- transcript window (rises from below) ----
  const twIn = eoc(seg(s, 13.3, 14.0));
  if (twIn > 0) {
    const ty = twin.y + (1 - twIn) * 90;
    const ta = twIn * endDim;
    glass(twin.x, ty, twin.w, twin.h, twin.r, ta, { tint: 'rgba(14,14,20,0.62)' });
    trafficLights(twin.x + 52, ty + 46, ta);
    ctx.save(); ctx.globalAlpha = ta;
    ctx.fillStyle = TXT; ctx.font = F(600, 33, true); ctx.textBaseline = 'middle';
    ctx.fillText('transcript.txt', twin.x + 200, ty + 48);
    ctx.strokeStyle = 'rgba(255,255,255,0.09)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(twin.x + 24, ty + 94); ctx.lineTo(twin.x + twin.w - 24, ty + 94); ctx.stroke();
    LINES.forEach((ln, i) => {
      const la = eoc(seg(s, 14.1 + i * 0.55, 14.55 + i * 0.55));
      if (la <= 0) return;
      const ly = ty + 190 + i * 196 + (1 - la) * 16;
      ctx.globalAlpha = ta * la;
      ctx.fillStyle = DIM; ctx.font = F(400, 27, true);
      ctx.fillText(ln[0], twin.x + 64, ly);
      chipLabel(ln[1], twin.x + 296, ly, ln[2], 1, 1);
      ctx.fillStyle = '#CDCED6'; ctx.font = F(400, 34);
      ctx.fillText(ln[3], twin.x + 64, ly + 72);
    });
    const fa = eoc(seg(s, 16.5, 17.0));
    if (fa > 0) {
      ctx.globalAlpha = ta * fa;
      ctx.fillStyle = DIM; ctx.font = F(400, 27, true);
      ctx.fillText('report.txt: all segments confident, none flagged', twin.x + 64, ty + twin.h - 70);
    }
    ctx.restore();
  }

  // ---- closing lockup (echoes the opening) ----
  const endIn = eoc(seg(s, 17.7, 18.4));
  if (endIn > 0) {
    const rise = (1 - endIn) * 26;
    appTile(W/2 - 80, H/2 - 300 + rise, 160, endIn);
    wordmark(W/2, H/2 + 20 + rise, SQ ? 140 : 150, endIn, 'center');
    ctx.save(); ctx.globalAlpha = endIn;
    ctx.font = F(400, 46); ctx.fillStyle = '#8A8A94';
    const tg = 'The backstage crew for MacWhisper';
    ctx.fillText(tg, (W - ctx.measureText(tg).width)/2, H/2 + 118 + rise);
    ctx.font = F(400, 34, true); ctx.fillStyle = DIM;
    const url = 'github.com/yashkotha/whisper-valet';
    ctx.fillText(url, (W - ctx.measureText(url).width)/2, H/2 + 196 + rise);
    ctx.restore();
  }

  // ---- opening title card (frame 0 = thumbnail) ----
  if (realS < SHIFT) {
    const out = 1 - eic(seg(realS, SHIFT - 0.45, SHIFT - 0.05));
    ctx.save();
    ctx.globalAlpha = Math.min(1, out);
    ctx.drawImage(orbCanvas, 0, 0, W, H);   // repaint ambient over the demo
    ctx.fillStyle = 'rgba(11,11,15,0.35)'; ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = out;
    appTile(W/2 - 90, H/2 - 250, 180, 1);
    wordmark(W/2, H/2 + 90, SQ ? 150 : 170, 1, 'center');
    ctx.font = F(400, 50); ctx.fillStyle = '#8F8F99';
    const tg = 'The backstage crew for MacWhisper';
    ctx.fillText(tg, (W - ctx.measureText(tg).width)/2, H/2 + 194);
    ctx.restore();
  }

  // ---- grain ----
  return true;
};

window.captureFrame = function(frame) {
  window.renderFrame(frame);
  return cnv.toDataURL('image/png');
};
renderFrame(0);
</script>
